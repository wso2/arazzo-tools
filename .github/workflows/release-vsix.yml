name: Release VSIX

on:
  workflow_dispatch:
    inputs:
      isPreRelease:
        required: true
        type: boolean
      arazzo:
        description: Release Arazzo extension
        type: boolean
        required: true
        default: false
      version:
        type: choice
        description: 'Enter the version type'
        required: true
        default: 'N/A'
        options:
          - 'patch'
          - 'minor'
          - 'major'
          - 'N/A'

permissions:
  contents: write
  pull-requests: write

jobs:
  Build:
    name: Build branch - ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      isPreRelease: ${{ inputs.isPreRelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Set up PNPM
        run: |
          corepack enable
          corepack prepare pnpm@10.11.0 --activate

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.x
          cache-dependency-path: |
            arazzo-designer-cli/go.sum
            extensions/arazzo-visualizer/arazzo-designer-lsp/go.sum

      - name: Install dependencies
        run: node common/scripts/install-run-rush.js install

      - name: Update Arazzo visualizer version
        if: ${{ inputs.version != 'N/A' }}
        working-directory: extensions/arazzo-visualizer/arazzo-designer-extension
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Build Arazzo visualizer
        if: ${{ inputs.arazzo }}
        run: node common/scripts/install-run-rush.js build --to arazzo-visualizer

      - name: Upload VSIX
        if: ${{ inputs.arazzo }}
        uses: actions/upload-artifact@v4
        with:
          name: VSIX
          path: |
            arazzo-visualizer-*.vsix
            extensions/arazzo-visualizer/arazzo-designer-extension/vsix/*.vsix
          if-no-files-found: error

  Release:
    name: Release VSIX
    needs: Build
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: VSIX
          path: ./

      - name: Get version
        id: vsix
        run: |
          if [[ "${{ github.event.inputs.arazzo }}" == "true" ]]; then
            file=$(ls arazzo-visualizer-[0-9]*.[0-9]*.[0-9]*.vsix)
          fi
          fileName=${file##*-}
          packageVersion=${fileName%.*}
          version=$(basename "$file" .vsix)
          echo $version
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "packageVersion=$packageVersion" >> $GITHUB_OUTPUT

      - name: Create a release in wso2/arazzo-tools repo for arazzo
        if: ${{ github.event.inputs.arazzo == 'true' }}
        uses: ./.github/actions/release
        with:
          repo: wso2/arazzo-tools
          name: arazzo-visualizer

      - name: Update Arazzo visualizer package version
        if: ${{ github.event.inputs.arazzo == 'true' }}
        env:
          PACKAGE_VERSION: ${{ steps.vsix.outputs.packageVersion }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'extensions/arazzo-visualizer/arazzo-designer-extension/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.version = process.env.PACKAGE_VERSION;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Create PR
        uses: ./.github/actions/pr
        with:
          version: ${{ steps.vsix.outputs.version }}
          isPreRelease: ${{ github.event.inputs.isPreRelease }}
          ref_name: ${{ github.ref_name }}
          arazzo: ${{ inputs.arazzo }}
