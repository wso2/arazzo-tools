name: Build Arazzo Visualizer

on:
  workflow_call:
    inputs:
      isPreRelease:
        type: boolean
        default: true
      runTrivy:
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      isPreRelease:
        type: boolean
        required: true
        default: true
      runTrivy:
        type: boolean
        required: true
        default: true

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      isPreRelease: ${{ inputs.isPreRelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.x
          cache-dependency-path: |
            arazzo-designer-cli/go.sum
            extensions/arazzo-visualizer/arazzo-designer-lsp/go.sum

      - name: Install dependencies
        run: node common/scripts/install-run-rush.js install

      - name: Build Arazzo visualizer
        run: node common/scripts/install-run-rush.js build --to arazzo-visualizer

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: arazzo-visualizer-vsix
          path: |
            arazzo-visualizer-*.vsix
            extensions/arazzo-visualizer/arazzo-designer-extension/vsix/*.vsix
          if-no-files-found: error

      - name: Run Trivy vulnerability scanner
        if: ${{ inputs.runTrivy }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          timeout: 10m
          skip-dirs: common/temp
          ignore-unfixed: true
